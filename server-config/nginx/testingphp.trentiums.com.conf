# RAM micro-cache zone — stored in /dev/shm (tmpfs)
proxy_cache_path /dev/shm/nginx_octane_cache
    levels=1:2
    keys_zone=OCTANE:64m
    max_size=512m
    inactive=60s
    use_temp_path=off;

proxy_cache_key "$scheme$request_method$host$request_uri";

map $request_method $skip_method { default 0; POST 1; PUT 1; PATCH 1; DELETE 1; }
map $http_cookie    $skip_cookie  { default 0; "~*laravel_session" 1; }
map $request_uri    $skip_uri     { default 0; "~*/api/user" 1; "~*/admin" 1; "~*/horizon" 1; "~*/pulse" 1; "~*/checkout" 1; }

server {
    listen 80;
    server_name testingphp.trentiums.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name testingphp.trentiums.com;

    ssl_certificate     /etc/letsencrypt/live/testingphp.trentiums.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testingphp.trentiums.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/testingphp.trentiums.com/public/public;
    index index.php;

    # Trust Cloudflare IPs for real visitor IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Static assets — 1yr cache, Cloudflare will cache these too
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Home page — Nginx RAM cache + Cloudflare edge cache
    location = / {
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";

        proxy_cache                  OCTANE;
        proxy_cache_valid            200 30s;
        proxy_cache_use_stale        error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock             on;
        proxy_ignore_headers         Cache-Control Set-Cookie;
        proxy_hide_header            Set-Cookie;
        # Override upstream no-cache — tell Cloudflare to cache for 30s
        proxy_hide_header            Cache-Control;
        add_header                   Cache-Control "public, max-age=30, s-maxage=30";
        add_header                   X-Cache $upstream_cache_status;
        add_header                   X-Powered-By "Octane+Swoole";
        add_header                   Vary "Accept-Encoding";
    }

    # /ping — Cloudflare edge cacheable
    location = /ping {
        proxy_pass            http://127.0.0.1:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";

        proxy_cache                  OCTANE;
        proxy_cache_valid            200 10s;
        proxy_cache_use_stale        error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock             on;
        proxy_ignore_headers         Cache-Control Set-Cookie;
        proxy_hide_header            Set-Cookie;
        proxy_hide_header            Cache-Control;
        add_header                   Cache-Control "public, max-age=10, s-maxage=10";
        add_header                   X-Cache $upstream_cache_status;
    }

    location / {
        set $skip_cache 0;
        if ($skip_method) { set $skip_cache 1; }
        if ($skip_cookie) { set $skip_cache 1; }
        if ($skip_uri)    { set $skip_cache 1; }

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_cache              OCTANE;
        proxy_cache_valid        200 10s;
        proxy_cache_valid        404 1m;
        proxy_cache_use_stale    error timeout updating http_500 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock         on;
        proxy_cache_bypass       $skip_cache;
        proxy_no_cache           $skip_cache;
        add_header               X-Cache $upstream_cache_status;
        add_header               X-Powered-By "Octane+Swoole";
    }

    access_log /var/www/testingphp.trentiums.com/logs/access.log;
    error_log  /var/www/testingphp.trentiums.com/logs/error.log;
}
